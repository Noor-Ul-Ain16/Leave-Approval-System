<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="login-page">

        <div class="login-card">

            <h2 class="login-title">Login as {{ role }}</h2>
            <p class="login-subtitle">Enter your credentials to continue</p>

            <form class="login-form" method="post">

                <input type="hidden" name="role" value="{{ role }}">

                <!-- EMAIL -->
                <label for="email">Email</label>
                <input 
                    type="email" 
                    placeholder="Email" 
                    name="email" 
                    id="email"
                    required
                >

                <!-- PASSWORD -->
                <label for="password">Password</label>
                <div class="password-box">
                    <input 
                        type="password" 
                        placeholder="Password" 
                        name="password" 
                        id="password" 
                        required
                    >

                    <i class="fa-solid fa-eye toggle-eye" id="togglePassword"></i>
                </div>

                <!-- FORGOT PASSWORD (FIXED) -->
                <a class="forgot_password" href="{{ url_for('auth.forgot_password') }}">
                    Forgot password?
                </a>

                {% if message %}
                    <p class="error-message">{{ message }}</p>
                {% endif %}

                <!-- LOGIN BUTTON (BLUEPRINT SAFE) -->
                {% if role == 'admin' %}
                    <button type="submit"
                            formaction="{{ url_for('auth.admin_login') }}"
                            class="login-submit">
                        Login
                    </button>
                {% else %}
                    <button type="submit"
                            formaction="{{ url_for('auth.employee_login') }}"
                            class="login-submit">
                        Login
                    </button>
                {% endif %}

            </form>

        </div>

    </div>

    <!-- PASSWORD TOGGLE SCRIPT -->
    <script>
        const togglePassword = document.getElementById("togglePassword");
        const password = document.getElementById("password");

        togglePassword.addEventListener("click", function () {
            const type = password.getAttribute("type") === "password" ? "text" : "password";
            password.setAttribute("type", type);

            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
        });
    </script>

</body>
</html>
