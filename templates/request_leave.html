{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/request_leave.css') }}">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
{% endblock %}

{% block content %}
<section class="whole-container">

    
    <div class="request-form-title">
        <h3>Request New Leave</h3>
    </div>
    <section class="form-container">
        <form action="{{ url_for('leave.request_leave') }}" method="POST">

            <label for="leave_type">Leave Type</label>

            <select id="leave_type"
            name="leave_type"
            required>

                <option value="">-- Select Leave Type --</option>

                <option value="Sick">Sick Leave</option>
                <option value="Casual">Casual Leave</option>
                <option value="Annual">Annual Leave</option>
                <option value="Emergency">Emergency Leave</option>
                <option value="Unpaid">Unpaid Leave</option>

            </select>

            <div class="form-dates">

                <div class="date-field">

                    <label for="start-date">Start Date</label>

                    <input type="date"
                   id="start-date"
                   name="start_date"
                   required>

                </div>

                <div class="date-field">

                    <label for="end-date">End Date</label>

                    <input type="date"
                   id="end-date"
                   name="end_date"
                   required>

                </div>

            </div>

            <label for="reason">Reason</label>

            <textarea name="reason"
              id="reason"
              placeholder="Enter reason for leave"
              required></textarea>
            <div class="form-error-message">
                {% if message%}
                    <p>{{message}}</p>
                {% endif %}
                </div>
             <div class="form-buttons">
                <a href="{{ url_for('leave.request_leave') }}">
                    <button type="button" id="cancel-button">
                        Cancel
                    </button>
                </a>

                <button type="submit"
                id="submit-button">
                Submit
                </button>

            </div>

        </form>

</section>

    
</section>

{% endblock %}
